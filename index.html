<!doctype html>
    <head>
        <title>Calculator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="Container"> 
            <div class="Calculator">
                <form>
                    <div class="display">
                        <input type="text" name="display" class="text_box">
                    </div>
                    <div >
                        <input type="button" value="AC" onclick="display.value=' '" class="first_row_operators">
                        <input type="button" value="DEL" onclick="display.value = display.value.toString().slice(0,-1)" class="first_row_operators">
                        <input type="button" value="%" onclick="display.value+='%'" class="first_row_operators">
                        <input type="button" value="/" onclick="display.value+='/'" class="last_column_operators">
                    </div>
                    <div>
                        <input type="button" value="7" onclick="display.value+='7'">
                        <input type="button" value="8" onclick="display.value+='8'">
                        <input type="button" value="9" onclick="display.value+='9'">
                        <input type="button" value="*" onclick="display.value+='*'" class="last_column_operators">
                    </div>
                    <div>
                        <input type="button" value="4" onclick="display.value+='4'">
                        <input type="button" value="5" onclick="display.value+='5'">
                        <input type="button" value="6" onclick="display.value+='6'">
                        <input type="button" value="-" onclick="display.value+='-'" class="last_column_operators">
                    </div>
                    <div>
                        <input type="button" value="1" onclick="display.value+='1'">
                        <input type="button" value="2" onclick="display.value+='2'">
                        <input type="button" value="3" onclick="display.value+='3'">
                        <input type="button" value="+" onclick="display.value+='+'" class="last_column_operators">
                    </div>
                    <div>
                        <input type="button" value="0" class="zero" onclick="display.value+='0'">
                        <input type="button" value="." onclick="display.value+='.'">
                        <input type="button" value="=" onclick="display.value=eval(display.value)" class="last_column_operators">
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
